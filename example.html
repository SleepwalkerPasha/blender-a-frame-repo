<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>A-Frame 3D Scene</title>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  
  <!-- Для анимаций -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>

<body>
  <a-scene background="color: #ECECEC">

    <!-- Камера -->
    <a-entity camera look-controls position="0 1.6 3" wasd-controls></a-entity>

    <!-- Свет -->
    <a-entity light="type: ambient; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; intensity: 1" position="1 3 2"></a-entity>

    <!-- Пол -->
    <a-plane 
      rotation="-90 0 0" 
      width="10" 
      height="10" 
      color="#7BC8A4">
    </a-plane>

    <!-- 3D модель (из интернета) -->
    <a-entity
      gltf-model="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
      position="0 0 0"
      scale="1 1 1"
      animation-mixer>
    </a-entity>

     <a-entity
      gltf-model="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
      position="5 0 0"
      scale="1 1 1"
      animation-mixer>
    </a-entity>
  </a-scene>
</body>
</html>
